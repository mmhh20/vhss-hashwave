name: tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - run: python -m pip install --upgrade pip

      - run: python -m pip install -e . -r requirements-dev.txt

      - run: python -m coverage run --branch --source=hashwave -m pytest -q

      - run: python -m coverage report --fail-under=85

      - run: vhss demo --generations 8 --beam 8 --per-parent 12 --seed ci --json
